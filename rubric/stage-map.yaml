# headline-стадия (гибрид): мотивирующий заголовок по среднему + честный флаг слабого звена.
# cluster_avg = mean(cap levels в кластере).
# headline_score = mean(cluster_avg по всем кластерам); headline_stage = round(headline_score) (к ближайшему).
# weak_link = кластер с минимальным cluster_avg — показывается отдельной строкой «слабое звено», НЕ занижает заголовок.
stage_rule: "round(mean(cluster_avg))"
weak_link_rule: "argmin(cluster_avg)"
stages:
  1: {name: "Болтает с ботом", desc: "AI как чат; система не накапливает"}
  2: {name: "Помощник",        desc: "агент помогает по задачам, но память/связи слабые"}
  3: {name: "Оператор",        desc: "агент работает в вашем контексте единообразно"}
  4: {name: "Дирижёр",         desc: "процессы измеряются и правятся данными"}
  5: {name: "Архитектор",      desc: "система сама совершенствуется"}
