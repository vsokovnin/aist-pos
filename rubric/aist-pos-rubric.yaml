# AIST POS consumer rubric — проекция 40-cap CMM на 9 Must (3 кластера)
# scale: CMM L1-L5 (фикс).
# профиль = per-cap уровни; в каждом кластере помечается слабое звено (самый низкий cap) — диагностический флаг, НЕ агрегат.
# headline-стадия (гибрид) = round(mean(cluster_avg)); слабое звено (min cluster_avg) показывается отдельно — см. stage-map.yaml.
meta:
  version: 0.1
  source_ssot: "docs/capability-model.md"
  scoring: "per-cap levels; weakest-link flagged; headline stage = round(mean(cluster_avg)); weak_link = argmin(cluster_avg)"

clusters:
  - id: context
    title: "Контекст — агент вас знает и помнит"
    caps: [memory, context_seed]
  - id: files
    title: "Файлы, структура, доступ"
    caps: [naming, root_file, git, source_map, connectors]
  - id: capture
    title: "Захват и граф знаний"
    caps: [capture, graph]

capabilities:
  - id: memory            # CMM #12
    cluster: context
    title: "Память между сессиями"
    inspect:
      - "файлы памяти (CLAUDE.md / memory.md / аналог), обновляемые между сессиями"
      - "разделение семантической (где что) и процедурной (как делать) памяти"
    ask: "Когда вы открываете новый чат — агент уже помнит ваши прошлые решения и привычки, или приходится каждый раз объяснять всё заново?"
    levels:
      L1: "Каждый новый чат начинаю с нуля — объясняю всё заново"
      L2: "Кое-что запоминает, но беспорядочно — нужное не всегда находит"
      L3: "Агент сам ведёт про меня заметки двух видов: что у меня есть и где лежит, и как я люблю, чтобы делалась работа"
      L4: "Слежу, что память реально помогает, и чищу лишнее, когда её накапливается слишком много"
      L5: "Память поддерживает себя сама: устаревшее убирается, а что повторяется — превращается в правило"
    actions:
      to_L3: "Поставь файлы памяти; раздели семантическую и процедурную"
      native: "Нативно быстрее: плагин Productivity (двухуровневая память + захват из разговоров)."

  - id: context_seed      # CMM #17
    cluster: context
    title: "Контекст на запуск"
    inspect:
      - "global instructions (что агент получает при старте: кто я, как работать)"
      - "корневой контекст-манифест / роутер, питающий значимые задачи"
    ask: "Когда вы даёте агенту конкретную задачу — он получает все нужные материалы и вводные заранее, или вы каждый раз вспоминаете и докидываете их по ходу?"
    levels:
      L1: "Запускаю задачу как есть — а нужные материалы вспоминаю и докидываю уже по ходу"
      L2: "Иногда готовлю вводные заранее, но без единого порядка — как придётся"
      L3: "На важные задачи есть понятный порядок: что собрать и откуда, прежде чем запускать — и я ему следую"
      L4: "Замечаю, когда задача пошла без полных вводных и её пришлось переделывать — и поправляю свой порядок"
      L5: "Порядок сам подстраивается: где вводных слишком много — упрощаю, где растут переделки — добавляю"
    actions:
      to_L3: "Опиши global instructions: кто я, как работать, что не делать"

  - id: naming            # CMM #24
    cluster: files
    title: "Конвенция имён"
    inspect:
      - "единый паттерн имён файлов (дата + тип + проект)"
      - "механизм enforcement (проверка/хук, отклоняющий неконформные имена)"
    ask: "Файлы названы по единому правилу — так, что и вы, и агент легко находите нужное? И агент сам так называет новые?"
    levels:
      L1: "Называю как придётся — потом трудно найти и разложить по порядку"
      L2: "Стараюсь придерживаться формата, но непоследовательно и никто не проверяет"
      L3: "Есть единое правило (дата + тип + проект), и все новые файлы называются по нему"
      L4: "Правило проверяется автоматически: имена «не по формату» не проходят, а старые в очереди на переименование"
      L5: "Правило само развивается: новые типы файлов добавляются по реальной надобности, проверка обновляется и ничего не ломает"
    actions:
      to_L3: "Заведи naming convention (дата+тип+проект), пропиши в корневой файл"

  - id: root_file         # CMM #38
    cluster: files
    title: "Корневой хаб-файл"
    inspect:
      - "корневой файл (CLAUDE.md / AGENTS.md) как роутер: куда что класть, где искать"
      - "слои контекста (global → workspace → проект) и guardrails «от обратного»"
    ask: "Есть файл-памятка для агента — где написано, куда что складывать и где что искать, чтобы он не блуждал?"
    levels:
      L1: "Такой памятки нет (или это беспорядочная куча правил) — агент не знает, куда идти за чем"
      L2: "Памятка есть, но это инструкции вперемешку, а не понятный указатель — одно и то же повторяется в разных местах"
      L3: "Памятка работает как указатель: «создаёшь файл — сюда, запускаешь проект — туда», с понятными разделами и правилами «чего не делать»"
      L4: "Замечаю, когда агент полез не туда или не нашёл нужное — и поправляю памятку"
      L5: "Памятка поддерживает себя сама: новое правило сразу попадает в нужный раздел, а устаревшие ссылки вычищаются"
    actions:
      to_L3: "Создай корневой файл-роутер с guardrails от обратного"

  - id: git               # CMM #39
    cluster: files
    title: "Git-версии + бэкап"
    inspect:
      - "git-репозиторий с историей изменений всей системы"
      - "авто-бэкап по расписанию; правило 3-2-1 (3 копии, 2 носителя, 1 вне площадки)"
    ask: "Если завтра компьютер сломается или важный файл случайно удалится — вы его потеряете, или он точно сохранён где-то ещё?"
    levels:
      L1: "Скорее потеряю — всё лежит только на компьютере, отдельно ничего не сохраняется"
      L2: "Иногда вручную копирую важное (на флешку, в облако, шлю себе на почту), но без системы — что-нибудь да пропадёт"
      L3: "Терять нечего: всё важное само сохраняется отдельно от компьютера (например, в облаке), причём сохраняются и прошлые версии — можно открыть файл таким, каким он был вчера или неделю назад"
      L4: "Иногда проверяю, что сохранённое реально на месте и из него получится всё восстановить — где пробел, закрываю"
      L5: "Всё под автоматическим присмотром: система сама проверяет сохранность и заранее предупреждает, если что-то важное не попало в надёжное хранилище"
    actions:
      to_L3: "Заведи git + авто-бэкап всей системы"

  - id: source_map        # CMM #40
    cluster: files
    title: "Карта источников + security"
    inspect:
      - "реестр источников контекста: что где лежит"
      - "уровень доступа / чувствительности по каждому источнику (вкл. изоляцию между клиентами)"
    ask: "Где лежат ваши рабочие материалы и что из них конфиденциальное — это где-то записано или только в голове?"
    levels:
      L1: "Всё держу в голове — отдельного списка, где что лежит и что конфиденциально, нет"
      L2: "Часть мест помню или записал, но не всё, и без пометок, что из этого конфиденциально"
      L3: "Есть список: где какие материалы лежат и насколько они конфиденциальные — и я сверяюсь с ним, прежде чем дать агенту к чему-то доступ"
      L4: "Время от времени проверяю, что список полный и ничего конфиденциального не ушло куда не надо — пробелы закрываю"
      L5: "Список ведёт себя сам: новое место с данными нельзя пускать в работу, пока не помечено, насколько оно конфиденциальное, а нарушения блокируются"
    actions:
      to_L3: "Составь карту источников × security-level"

  - id: connectors        # CMM #18
    cluster: files
    title: "Интеграции (MCP)"
    inspect:
      - "подключённые коннекторы к ключевым системам (почта, календарь, мессенджеры)"
      - "реестр интеграций + протокол discovery перед запросом доступа"
    ask: "Ваш агент может сам заглянуть в почту, календарь, мессенджеры — или работает только с тем, что вы ему вручную скопируете?"
    levels:
      L1: "Доступа к моей почте/календарю у агента нет — что нужно, копирую и вставляю руками"
      L2: "Кое-что подключил (например, почту), но набор случайный — что-то есть, что-то нет, общего списка нет"
      L3: "Главные системы (почта, календарь, при желании мессенджеры) подключены к агенту, и у меня есть понятный список, что к чему подключено"
      L4: "Слежу, все ли нужные системы подключены и всё ли работает — где пробел или сбой, чиню"
      L5: "Подключения расширяются сами: если я часто лезу куда-то через браузер — это подсказывает подключить, а лишнее отключается"
    actions:
      to_L3: "Подключи Gmail/Outlook + Calendar коннекторы"
      native: "Нативные Connectors Claude: Google Workspace (дефолт для индивида) или M365 (enterprise, read-only)."

  - id: capture           # CMM #11
    cluster: capture
    title: "Захват входящих"
    inspect:
      - "автоматический ингест источников (почта, мессенджеры, транскрипты) в inbox"
      - "воронка inbox → сортировка в действие или знание"
    ask: "Ничего важное из переписки и встреч у вас не теряется — оно само попадает в задачи и заметки? Или приходится вручную следить, чтобы не забыть?"
    levels:
      L1: "Слежу за всем вручную и в голове — что-то забывается и теряется"
      L2: "Часть сохраняется сама, но без порядка — всё равно приходится перепроверять, чтобы не упустить"
      L3: "Важное из писем, сообщений и встреч само превращается в задачи (чтобы не забыть) и заметки (чтобы потом найти) — ничего не теряется"
      L4: "Слежу, что дошло до задач и заметок, а что упустил — и налаживаю разбор"
      L5: "Разбор улучшается сам: новый постоянный источник подхватывается автоматически, а лишнее (спам, шум) отсекается"
    actions:
      to_L3: "Настрой ингест источников → inbox"
      native: "Нативно быстрее: Productivity (/update --comprehensive) или Enterprise search для разбора входящих."

  - id: graph             # CMM #13
    cluster: capture
    title: "Граф сущностей"
    inspect:
      - "реестры организаций / людей / проектов как карточки"
      - "связи между сущностями (организация ← люди, проекты) и единый источник правды на сущность"
    ask: "Агент знает людей, компании и проекты, с которыми вы работаете, и как они связаны — так, что стоит упомянуть человека или проект, а он уже понимает, о ком или о чём речь? Или всё держится у вас в голове?"
    levels:
      L1: "Кто есть кто и как связано — всё у меня в голове, отдельных записей нет"
      L2: "Что-то записано по отдельности, но без единых карточек и без связей между ними"
      L3: "На каждую компанию, человека и проект есть карточка, они связаны между собой (человек — из компании, проект — с людьми), и по каждому одна главная запись"
      L4: "Слежу, что карточки полные и свежие, а одно и то же не заведено дважды — и поправляю"
      L5: "Всё поддерживается само: если данные о ком-то разошлись по разным местам — это замечается, а дубликаты сливаются в одну карточку"
    actions:
      to_L3: "Заведи граф: организация (база) ← люди, проекты"
